<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- CRITICAL MOBILE VIEWPORT META TAG -->
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover" />
    <!-- MOBILE APP FEATURES -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Satti Center" />
    <!-- THEME COLOR FOR BROWSER UI -->
    <meta name="theme-color" content="#0d0d0d" />
    <!-- DISABLE PINCH ZOOM ON LINKS (OPTIONAL - UNCOMMENT IF NEEDED) -->
    <!-- <meta name="apple-mobile-web-app-status-bar-style" content="default" /> -->
    
    <title>Satti Center - Classic Card Strategy Online</title>
    <meta name="description" content="Play Satti Center, a classic card strategy game online with friends." />
    
    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- GOOGLE FONTS PRELOAD -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin />
    
    <style>
      /* Prevent elastic scroll on iOS but allow normal scrolling */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        background: radial-gradient(circle at top left, #0d0d0d, #1a1a1a);
        color: white;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
      }
      
      /* Prevent text selection issues on long press */
      input, button {
        -webkit-user-select: none;
        user-select: none;
      }
      
      /* Prevent iOS zoom on input focus */
      input {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
